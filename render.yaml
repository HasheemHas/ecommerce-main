services:
  - type: web
    name: ecommerce-main
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health.php
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: NVIDIA_API_KEY
        sync: false
      - key: RUN_DB_MIGRATIONS
        value: "0"
    plan: free
